<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Q Surface Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="stylesheet.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
    <div class="controls">

  <div class="group">
    <button id="cameraValues">Print Camera Values</button>
    <button id="printColors">Print Colors</button>
    <button id="printColors">Print Intensities</button>
    <button id="topViewBtn">Top View</button>
  </div>

  <div class="group">
    <label>
      Point Light 1 Intensity
      <input type="range" id="pointIntensity1" min="0" max="2" value="1" step="0.001">
    </label>

    <label>
      Point Light 2 Intensity
      <input type="range" id="pointIntensity2" min="0" max="2" value="1" step="0.001">
    </label>

    <label>
      Point Light 1 Color
      <input id="point1Color" type="color">
    </label>

    <label>
      Point Light 2 Color
      <input id="point2Color" type="color">
    </label>
  </div>

  <div class="group">
    <label>
      Directional Light 1 Intensity
      <input type="range" id="directionalIntensity1" min="0" max="0.5" value="0.15" step="0.001">
    </label>

    <label>
      Directional Light 2 Intensity
      <input type="range" id="directionalIntensity2" min="0" max="0.5" value="0.15" step="0.001">
    </label>

    <label>
      Directional Light 1 Color
      <input id="directionalColor1" type="color">
    </label>

    <label>
      Directional Light 2 Color
      <input id="directionalColor2" type="color">
    </label>
  </div>

</div>
    <!-- <input type="range" id="IOR" min="0" max="1" step="0.001" value="0"> -->


    <script type="module" src="cameraControls.js"></script>
    <script type="module" src="script2.js"></script>
</body>
</html>
